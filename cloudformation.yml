AWSTemplateFormatVersion: '2010-09-09'\nDescription: 'FormCritic Lambda Function for AI Workout Form Analysis'\n\nParameters:\n  AnthropicApiKey:\n    Type: String\n    NoEcho: true\n    Description: 'Your Anthropic API key (get from console.anthropic.com)'\n  FunctionName:\n    Type: String\n    Default: 'form-critic-analyzer'\n    Description: 'Name for the Lambda function'\n  Memory:\n    Type: Number\n    Default: 1024\n    MinValue: 128\n    MaxValue: 10240\n    Description: 'Memory allocation for Lambda (MB)'\n  Timeout:\n    Type: Number\n    Default: 60\n    MinValue: 1\n    MaxValue: 900\n    Description: 'Function timeout (seconds)'\n\nResources:\n  # IAM Role for Lambda\n  LambdaExecutionRole:\n    Type: AWS::IAM::Role\n    Properties:\n      AssumeRolePolicyDocument:\n        Version: '2012-10-17'\n        Statement:\n          - Effect: Allow\n            Principal:\n              Service: lambda.amazonaws.com\n            Action: sts:AssumeRole\n      ManagedPolicyArns:\n        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole\n      Tags:\n        - Key: Application\n          Value: FormCritic\n\n  # Lambda Function\n  FormCriticFunction:\n    Type: AWS::Lambda::Function\n    Properties:\n      FunctionName: !Ref FunctionName\n      Runtime: nodejs18.x\n      Handler: dist/index.handler\n      Role: !GetAtt LambdaExecutionRole.Arn\n      Timeout: !Ref Timeout\n      MemorySize: !Ref Memory\n      Environment:\n        Variables:\n          ANTHROPIC_API_KEY: !Ref AnthropicApiKey\n      Code:\n        ZipFile: |\n          // Placeholder - will be replaced during deployment\n          exports.handler = async (event) => {\n            return { statusCode: 200, body: 'Placeholder' };\n          };\n      Tags:\n        - Key: Application\n          Value: FormCritic\n\n  # Function URL\n  FormCriticFunctionUrl:\n    Type: AWS::Lambda::Url\n    Properties:\n      TargetFunctionArn: !Ref FormCriticFunction\n      AuthType: NONE\n      Cors:\n        AllowOrigins:\n          - '*'\n        AllowMethods:\n          - POST\n        AllowHeaders:\n          - Content-Type\n          - x-app-key\n        MaxAge: 86400\n\n  # Permission for Function URL\n  FormCriticFunctionUrlPermission:\n    Type: AWS::Lambda::Permission\n    Properties:\n      FunctionName: !Ref FormCriticFunction\n      Action: lambda:InvokeFunctionUrl\n      Principal: '*'\n\n  # CloudWatch Log Group\n  FormCriticLogGroup:\n    Type: AWS::Logs::LogGroup\n    Properties:\n      LogGroupName: !Sub '/aws/lambda/${FunctionName}'\n      RetentionInDays: 14\n\nOutputs:\n  FunctionUrl:\n    Description: 'HTTPS endpoint for the Lambda function'\n    Value: !GetAtt FormCriticFunctionUrl.FunctionUrl\n    Export:\n      Name: !Sub '${FunctionName}-URL'\n\n  FunctionArn:\n    Description: 'ARN of the Lambda function'\n    Value: !GetAtt FormCriticFunction.Arn\n    Export:\n      Name: !Sub '${FunctionName}-ARN'\n\n  LambdaRoleArn:\n    Description: 'ARN of the Lambda execution role'\n    Value: !GetAtt LambdaExecutionRole.Arn\n    Export:\n      Name: !Sub '${FunctionName}-RoleARN'\n\n  LogGroup:\n    Description: 'CloudWatch Log Group for Lambda logs'\n    Value: !Ref FormCriticLogGroup\n    Export:\n      Name: !Sub '${FunctionName}-LogGroup'\n"
